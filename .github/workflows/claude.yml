name: Claude Code

# Issue / PR で `@claude` とメンションすると、Claude Code が文脈を分析して
# コメント返信・コード実装・PR 作成などを行う対話型ワークフロー。
# watch ワークフロー（claude-code-update-watch.yml）が作る取り込み提案 Issue に対し、
# `@claude この提案を実装して` のように指示して PR を作らせる流れを想定している。

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

permissions: {}

# 同一 Issue / PR への多重起動を抑止してサブスク枠の浪費を防ぐ。
# 実装途中のジョブを止めないよう cancel-in-progress は false。
concurrency:
  group: claude-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  claude:
    # `@claude` を含むイベントだけに反応する。これがないと全コメントでジョブが起動する。
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@787c5a0ce96a9a6cfb050ea0c8f4c05f2447c251 # v1.0.133
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model claude-opus-4-8
            --max-turns 30
            --allowedTools "Bash"
