name: validate-agents-skills

on:
  pull_request:
    paths:
      - 'claude/skills/**'
      - 'claude/agents/**'
      - 'scripts/validate-agents-skills.mjs'
      - '.github/workflows/validate-agents-skills.yml'
  push:
    branches:
      - main
    paths:
      - 'claude/skills/**'
      - 'claude/agents/**'
      - 'scripts/validate-agents-skills.mjs'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: node scripts/validate-agents-skills.mjs
