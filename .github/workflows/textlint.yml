name: textlint

on:
  pull_request:
    paths:
      - 'docs/**/*.md'
      - 'claude/**/*.md'
      - 'README.md'
      - '.textlintrc'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/textlint.yml'
  push:
    branches:
      - main
    paths:
      - 'docs/**/*.md'
      - 'claude/**/*.md'
      - 'README.md'
      - '.textlintrc'
      - 'package.json'
      - 'package-lock.json'

jobs:
  textlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
