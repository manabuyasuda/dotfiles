[tools]
node = "lts"
pnpm = "latest"
yarn = "latest"

"npm:@mermaid-js/mermaid-cli" = "latest"
"npm:@axe-core/cli" = "latest"
"npm:@lhci/cli" = "latest"
"npm:@redocly/cli" = "latest"
"npm:@socketsecurity/cli" = "latest"
"npm:bundle-phobia-cli" = "latest"
# npm: ツールはすべて latest。公開5日未満の版は ~/.npmrc の min-release-age=5 に
# 拒否され mise install が ETARGET で失敗することがある。バージョンは固定せず、
# README「mise install が ETARGET で失敗する場合」の手順で対応する。
"npm:create-next-app" = "latest"
"npm:dependency-cruiser" = "latest"
"npm:firebase-tools" = "latest"
"npm:knip" = "latest"
"npm:madge" = "latest"
"npm:npm-check-updates" = "latest"
"npm:type-coverage" = "latest"
"npm:vercel" = "latest"
"npm:sfw" = "latest"
